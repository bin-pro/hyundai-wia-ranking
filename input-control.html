<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>컨트롤 챌린지 — 등록</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, #b8c8ee 0%, #cdd8f4 28%, #dde3f8 55%, #eeeef8 78%, #f7f7fd 100%);
      min-height: 100vh;
    }
    .bg-crystal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      pointer-events: none; z-index: 0;
      mix-blend-mode: multiply; opacity: 1;
    }
    .emblem-50 {
      position: fixed; top: -24px; right: -36px;
      width: 320px; pointer-events: none; z-index: 10;
      mix-blend-mode: multiply;
    }
    .wrapper {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      padding: 14px 18px 0;
      max-width: 500px; margin: 0 auto;
    }
    .top-header { flex-shrink: 0; margin-bottom: 8px; }
    .campaign-label {
      font-size: 10px; font-weight: 600;
      color: #3a4080; letter-spacing: 1px; margin-bottom: 4px;
    }
    .beyond-logo { fill: #040000; width: 68%; height: auto; display: block; }
    .game-section {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .game-text { flex: 1; }
    .game-title { font-size: 26px; font-weight: 900; color: #5a1080; line-height: 1.1; }
    .game-sub   { font-size: 12px; font-weight: 600; color: #7a3888; margin-top: 3px; }
    .game-icon {
      width: 76px; height: 76px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
    }
    .game-icon img { display: block; width: 1123px; height: auto; margin-left: -201px; margin-top: -438px; }
    .form-card {
      flex: 1; min-height: 0;
      background: rgba(228,210,248,0.78);
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 8px 32px rgba(80,30,150,0.10);
      backdrop-filter: blur(18px);
      padding: 18px 18px 14px;
      display: flex; flex-direction: column; gap: 13px;
      overflow: hidden;
    }
    .field-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #1a1a40;
      margin-bottom: 8px;
    }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: #3a1a6a; color: #fff;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .input-wrap { position: relative; }
    .field-input {
      width: 100%; height: 50px;
      background: #fff; border: 1.5px solid #dddaf0;
      border-radius: 12px; padding: 0 16px;
      font-size: 20px; font-weight: 700; color: #0b1030;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #8030a8; box-shadow: 0 0 0 3px rgba(128,48,168,0.12); }
    .field-unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; font-weight: 700; color: #8068aa;
    }
    .site-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .site-btn {
      height: 44px;
      background: #f2f0fb; border: 1.5px solid #d8d0ec;
      border-radius: 10px;
      font-size: 13px; font-weight: 700; color: #5a4880;
      cursor: pointer; transition: all 0.18s; font-family: inherit;
    }
    .site-btn:active { transform: scale(0.96); }
    .site-btn.selected { background: #3a1a6a; border-color: #3a1a6a; color: #fff; }
    .submit-btn {
      width: 100%; height: 54px;
      background: linear-gradient(135deg, #003984, #1060d0);
      border: none; border-radius: 14px;
      color: #fff; font-size: 18px; font-weight: 800;
      letter-spacing: 2px; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 18px rgba(0,57,132,0.35);
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex-shrink: 0;
    }
    .submit-btn:active { opacity: 0.88; transform: scale(0.98); }
    .page-footer {
      flex-shrink: 0;
      background: rgba(255,255,255,0.92);
      border-top: 1px solid rgba(220,218,244,0.8);
      padding: 10px 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .footer-logo { height: 32px; filter: brightness(0); }
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(10,10,40,0.88); color: #fff;
      padding: 10px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 600;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<img class="bg-crystal"
     src="현대위아 창립 50주년 랭킹보드 아이콘_PNG, SVG/PNG/파란 보석 그래픽들_세로형.png"
     alt="" />
<img class="emblem-50"
     src="현대위아 창립 50주년 랭킹보드 아이콘_PNG, SVG/PNG/빨간 50주년 엠블럼.png"
     alt="" />

<div class="wrapper">
  <div class="top-header">
    <div class="campaign-label">현대위아 창립 50주년 연간 캠페인</div>
    <svg class="beyond-logo" viewBox="722 508 362 338" xmlns="http://www.w3.org/2000/svg">
      <path d="M727.62,664.86v-151.37h24.09c16.18,0,22.44,7.54,22.44,25.93v30.35c0,9.38-3.13,15.08-9.2,16.74,5.89,1.29,11.04,5.7,11.04,16.74v36.05c0,17.84-8.09,25.57-24.28,25.57h-24.09ZM761.1,539.24c0-8.64-2.57-11.59-9.38-11.59h-10.12v53.52h10.3c6.62,0,9.2-2.94,9.2-10.12v-31.82ZM761.65,605.64c0-8.64-1.84-12.14-9.75-12.14h-10.3v57.57h10.12c6.62,0,9.93-3.86,9.93-11.77v-33.66Z"/>
      <path d="M787.4,664.86v-151.37h40.09v14.16h-26.12v53.15h18.39v13.98h-18.39v56.28h27.04v13.79h-41.01Z"/>
      <path d="M855.26,664.86v-67.87l-21.34-83.5h14.71c4.78,19.86,12.32,51.5,14.35,62.35,2.02-10.85,9.56-42.3,14.9-62.35h13.61l-22.07,83.5v67.87h-14.16Z"/>
      <path d="M895.91,537.59c0-17.1,7.91-25.75,23.73-25.75s23.91,8.64,23.91,25.75v103.18c0,17.1-7.91,25.75-23.91,25.75s-23.73-8.64-23.73-25.75v-103.18ZM929.56,537.59c0-7.72-3.31-11.59-9.93-11.59s-9.75,3.86-9.75,11.59v103.18c0,7.91,3.31,11.95,9.75,11.95s9.93-4.05,9.93-11.95v-103.18Z"/>
      <path d="M993.75,664.86l-26.12-110.54c.18,22.99.18,44.14.18,67.13v43.41h-12.14v-151.37h16.74l23.17,110.91c-.18-20.78-.18-40.46-.18-61.25v-49.66h12.32v151.37h-13.98Z"/>
      <path d="M1021.16,664.86v-151.37h23.54c16.18,0,23.91,9.75,23.91,25.93v99.69c0,17.1-7.91,25.75-23.91,25.75h-23.54ZM1054.63,539.61c0-7.54-3.31-11.95-9.93-11.95h-9.56v123.41h9.56c6.62,0,9.93-4.05,9.93-11.95v-99.5Z"/>
      <path d="M786.19,841.44v-47.44c0-23.05.19-44.77.38-67.82l-16.96,115.26h-12.76l-16.77-115.26c.19,23.05.38,44.77.38,67.82v47.44h-13.34v-156.8h19.43l16.58,122.5,16.57-122.5h20v156.8h-13.53Z"/>
      <path d="M812.29,709.6c0-17.72,8.19-26.67,24.58-26.67s24.77,8.95,24.77,26.67v106.88c0,17.72-8.19,26.67-24.77,26.67s-24.58-8.95-24.58-26.67v-106.88ZM847.15,709.6c0-8-3.43-12-10.29-12s-10.1,4-10.1,12v106.88c0,8.19,3.43,12.38,10.1,12.38s10.29-4.19,10.29-12.38v-106.88Z"/>
      <path d="M883.92,841.44v-142.13h-17.53v-14.67h49.34v14.67h-17.53v142.13h-14.29Z"/>
      <path d="M925.26,841.44v-156.8h14.48v156.8h-14.48Z"/>
      <path d="M953.27,709.6c0-17.72,8.19-26.67,24.58-26.67s24.77,8.95,24.77,26.67v106.88c0,17.72-8.19,26.67-24.77,26.67s-24.58-8.95-24.58-26.67v-106.88ZM988.13,709.6c0-8-3.43-12-10.29-12s-10.1,4-10.1,12v106.88c0,8.19,3.43,12.38,10.1,12.38s10.29-4.19,10.29-12.38v-106.88Z"/>
      <path d="M1054.62,841.44l-27.05-114.5c.19,23.81.19,45.72.19,69.54v44.96h-12.57v-156.8h17.34l24.01,114.88c-.19-21.53-.19-41.91-.19-63.44v-51.44h12.76v156.8h-14.48Z"/>
    </svg>
  </div>

  <div class="game-section">
    <div class="game-text">
      <div class="game-title">컨트롤 챌린지</div>
      <div class="game-sub">흔들림 없이 나아간 50년</div>
    </div>
    <div class="game-icon"><img src="현대위아 창립 50주년 랭킹보드 아이콘_PNG, SVG/SVG/챌린지 아이콘 3종.svg" alt="컨트롤" /></div>
  </div>

  <div class="form-card">
    <div class="field-group">
      <div class="field-label"><span class="step-num">①</span> 스코어 입력</div>
      <div class="input-wrap">
        <input class="field-input" id="score" type="number" inputmode="decimal"
               placeholder="" autocomplete="off" step="0.01" />
        <span class="field-unit">초</span>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label"><span class="step-num">②</span> 사용자 이름 입력</div>
      <input class="field-input" id="name" type="text" placeholder="" autocomplete="off" />
    </div>
    <div class="field-group">
      <div class="field-label"><span class="step-num">③</span> 소속 선택</div>
      <div class="site-grid">
        <button class="site-btn" data-site="창원1공장" onclick="selectSite(this)">창원1공장</button>
        <button class="site-btn" data-site="창원2공장" onclick="selectSite(this)">창원2공장</button>
        <button class="site-btn" data-site="창원3공장" onclick="selectSite(this)">창원3공장</button>
        <button class="site-btn" data-site="의왕"     onclick="selectSite(this)">의왕</button>
        <button class="site-btn" data-site="서산"     onclick="selectSite(this)">서산</button>
        <button class="site-btn" data-site="평택"     onclick="selectSite(this)">평택</button>
      </div>
    </div>
    <button class="submit-btn" onclick="submit()">등록하기 ›</button>
  </div>

  <div class="page-footer">
    <img class="footer-logo"
         src="현대위아 창립 50주년 랭킹보드 아이콘_PNG, SVG/SVG/HYUNDAI WIA, 50 로고.svg"
         alt="HYUNDAI WIA 50th" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let selectedSite = '';
  function selectSite(el) {
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedSite = el.dataset.site;
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function submit() {
    const score = document.getElementById('score').value.trim();
    const name  = document.getElementById('name').value.trim();
    if (!score) { showToast('스코어를 입력해주세요.'); return; }
    if (!name)  { showToast('이름을 입력해주세요.'); return; }
    if (!selectedSite) { showToast('소속을 선택해주세요.'); return; }
    console.log('Submit:', { game:'control', score, name, site: selectedSite });
    showToast('등록되었습니다!');
    document.getElementById('score').value = '';
    document.getElementById('name').value  = '';
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    selectedSite = '';
  }
</script>
</body>
</html>
