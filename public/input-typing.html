<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>타이핑 챌린지 — 등록</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, #aed4ee 0%, #c8e2f4 28%, #ddedf9 55%, #eef5fb 78%, #f7fafd 100%);
      min-height: 100vh;
    }

    /* ── Crystal BG ── */
    .bg-crystal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      pointer-events: none; z-index: 0;
      mix-blend-mode: multiply; opacity: 1;
    }

    /* ── 50th Emblem ── */
    .emblem-50 {
      position: fixed; top: -30px; right: -40px;
      width: 220px; pointer-events: none; z-index: 10;
      mix-blend-mode: multiply;
    }

    /* ── Main Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      padding: 14px 18px 0;
      max-width: 500px; margin: 0 auto;
    }

    /* ── Top Header ── */
    .top-header { flex-shrink: 0; margin-bottom: 8px; }
    .campaign-label {
      font-size: 10px; font-weight: 600;
      color: #3a6080; letter-spacing: 1px; margin-bottom: 4px;
    }
    .beyond-logo {
      fill: #040000;
      width: 68%; height: auto; display: block;
    }

    /* ── Game Section ── */
    .game-section {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .game-text { flex: 1; }
    .game-title {
      font-size: 26px; font-weight: 900;
      color: #1a6030; line-height: 1.1;
    }
    .game-sub {
      font-size: 12px; font-weight: 600;
      color: #4a7a5a; margin-top: 3px;
    }
    .game-icon {
      width: 76px; height: 76px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
    }
    .game-icon img { display: block; width: 1123px; height: auto; margin-left: -204px; margin-top: -327px; }

    /* ── Form Card ── */
    .form-card {
      flex: 1; min-height: 0;
      background: rgba(205,242,225,0.78);
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 8px 32px rgba(20,100,60,0.10);
      backdrop-filter: blur(18px);
      padding: 18px 18px 14px;
      display: flex; flex-direction: column; gap: 13px;
      overflow: hidden;
    }

    /* ── Field Group ── */
    .field-group {}
    .field-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #1a3050;
      margin-bottom: 8px;
    }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: #1a3a6a;
      color: #fff; font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .input-wrap { position: relative; }
    .field-input {
      width: 100%; height: 50px;
      background: #fff;
      border: 1.5px solid #dde8f0;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 20px; font-weight: 700; color: #0b1f3a;
      font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #2c8a44; box-shadow: 0 0 0 3px rgba(44,138,68,0.12); }
    .field-unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; font-weight: 700; color: #6888aa;
    }

    /* ── Site Buttons ── */
    .site-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .site-btn {
      height: 44px;
      background: #f0f5fb;
      border: 1.5px solid #d0dcea;
      border-radius: 10px;
      font-size: 13px; font-weight: 700; color: #4a6a8a;
      cursor: pointer; transition: all 0.18s;
      font-family: inherit;
    }
    .site-btn:active { transform: scale(0.96); }
    .site-btn.selected {
      background: #1a3a6a; border-color: #1a3a6a; color: #fff;
    }

    /* ── Submit Button ── */
    .submit-btn {
      width: 100%; height: 54px;
      background: linear-gradient(135deg, #003984, #1060d0);
      border: none; border-radius: 14px;
      color: #fff; font-size: 18px; font-weight: 800;
      letter-spacing: 2px; cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 18px rgba(0,57,132,0.35);
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex-shrink: 0;
    }
    .submit-btn:active { opacity: 0.88; transform: scale(0.98); }

    /* ── Footer ── */
    .page-footer {
      flex-shrink: 0;
      background: rgba(255,255,255,0.92);
      border-top: 1px solid rgba(220,232,244,0.8);
      padding: 10px 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .footer-logo { height: 32px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(10,30,60,0.88); color: #fff;
      padding: 10px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 600;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

<div class="toast" id="toast"></div>

<script>
  let selectedSite = '';

  function selectSite(el) {
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedSite = el.dataset.site;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function submit() {
    const score = document.getElementById('score').value.trim();
    const name  = document.getElementById('name').value.trim();
    if (!score) { showToast('스코어를 입력해주세요.'); return; }
    if (!name)  { showToast('이름을 입력해주세요.'); return; }
    if (!selectedSite) { showToast('소속을 선택해주세요.'); return; }

    fetch('/api/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game: 'typing', score: Number(score), name, site: selectedSite })
    }).then(r => r.ok ? showToast('등록되었습니다!') : showToast('오류가 발생했습니다.'))
      .catch(() => showToast('서버 연결 오류'));

    document.getElementById('score').value = '';
    document.getElementById('name').value  = '';
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    selectedSite = '';
  }
</script>
</body>
</html>
