<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랭킹 관리자 — HYUNDAI WIA Back Office</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
      background: #060d18;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: #0a1829;
      border-bottom: 1px solid #1e2d45;
      padding: 0 28px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-logo { height: 22px; filter: brightness(0) invert(1); opacity: 0.9; }
    .header-logo-fallback { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 1.5px; }
    .header-divider { width: 1px; height: 24px; background: #2a3d55; }
    .header-title { font-size: 15px; font-weight: 700; color: #94a3b8; }
    .header-badge { font-size: 10px; font-weight: 700; color: #f5c400; background: rgba(245,196,0,0.12); border: 1px solid rgba(245,196,0,0.25); border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-add {
      background: #1468e0;
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 9px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #1a78f0; }
    .btn-add-icon { font-size: 16px; font-weight: 400; line-height: 1; }
    .btn-excel {
      background: #16a34a;
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 9px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-excel:hover { background: #15803d; }
    .btn-danger {
      background: #1a2535;
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 9px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.15); }

    /* ── Main layout ─────────────────────────────── */
    .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

    /* ── Filter bar ──────────────────────────────── */
    .filter-bar {
      background: #111827;
      border: 1px solid #1e2d45;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; min-width: 42px; }
    .filter-btn {
      background: #1a2535;
      border: 1px solid #2a3d55;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { background: #22334a; color: #e2e8f0; }
    .filter-btn.active { background: rgba(245,196,0,0.12); border-color: rgba(245,196,0,0.4); color: #f5c400; }

    /* ── Stats cards ─────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card {
      background: #111827;
      border: 1px solid #1e2d45;
      border-radius: 14px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; font-weight: 600; color: #475569; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; color: #f1f5f9; line-height: 1; }
    .stat-sub { font-size: 11px; color: #475569; margin-top: 4px; }
    .stat-card.typing .stat-value { color: #3b82f6; }
    .stat-card.control .stat-value { color: #8b5cf6; }
    .stat-card.jump .stat-value { color: #10b981; }

    /* ── Table ───────────────────────────────────── */
    .table-wrap {
      background: #111827;
      border: 1px solid #1e2d45;
      border-radius: 14px;
      overflow: hidden;
    }
    .table-header-bar {
      padding: 16px 20px 14px;
      border-bottom: 1px solid #1e2d45;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .table-count { font-size: 12px; color: #475569; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #0d1a2a;
      padding: 11px 16px;
      font-size: 11px; font-weight: 700;
      color: #475569; text-align: left;
      letter-spacing: 0.5px; text-transform: uppercase;
      border-bottom: 1px solid #1e2d45;
      white-space: nowrap;
    }
    .th-filter {
      display: inline-flex; align-items: center; gap: 6px;
      position: relative;
    }
    .filter-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      border-radius: 4px;
      background: #1a2535;
      color: #64748b;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-icon:hover { background: #22334a; color: #e2e8f0; }
    .filter-icon.active { background: rgba(245,196,0,0.15); color: #f5c400; }
    .date-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #0d1a2a;
      border: 1px solid #2a3d55;
      border-radius: 10px;
      padding: 10px;
      min-width: 200px;
      z-index: 80;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }
    .date-dropdown.show { display: block; }
    .date-dropdown-title {
      font-size: 10px; font-weight: 700;
      color: #64748b;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .date-option {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px; font-weight: 600;
      color: #cbd5e1;
      text-transform: none;
      letter-spacing: 0;
    }
    .date-option:hover { background: #1a2535; }
    .date-option input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: #f5c400;
      cursor: pointer;
    }
    .date-dropdown-actions {
      display: flex; gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2d45;
    }
    .date-mini-btn {
      flex: 1;
      background: #1a2535;
      border: 1px solid #2a3d55;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 10px; font-weight: 700;
      padding: 5px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .date-mini-btn:hover { background: #22334a; color: #e2e8f0; }
    tbody tr { border-bottom: 1px solid #1a2535; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 13px 16px; font-size: 13px; color: #cbd5e1; vertical-align: middle; }
    .rank-badge {
      width: 28px; height: 28px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      background: #1a2535; color: #64748b;
    }
    .rank-badge.top1 { background: rgba(245,196,0,0.15); color: #f5c400; }
    .rank-badge.top2 { background: rgba(203,213,225,0.1); color: #94a3b8; }
    .rank-badge.top3 { background: rgba(180,100,40,0.15); color: #c97a3a; }
    .score-val { font-size: 15px; font-weight: 800; color: #f1f5f9; }
    .score-unit { font-size: 10px; font-weight: 600; color: #475569; margin-left: 2px; }
    .name-cell { font-weight: 600; color: #e2e8f0; }
    .chip {
      display: inline-flex; align-items: center;
      border-radius: 20px;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px;
      white-space: nowrap;
    }
    .time-cell { font-size: 11px; color: #475569; }
    .action-cell { display: flex; gap: 6px; }
    .btn-edit, .btn-del {
      padding: 5px 12px; border-radius: 7px;
      font-size: 11px; font-weight: 700; cursor: pointer; border: none;
      transition: all 0.15s;
    }
    .btn-edit { background: rgba(20,104,224,0.12); color: #3b82f6; border: 1px solid rgba(59,130,246,0.25); }
    .btn-edit:hover { background: rgba(20,104,224,0.22); }
    .btn-del  { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
    .btn-del:hover  { background: rgba(239,68,68,0.2); }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
      padding: 20px;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #111827;
      border: 1px solid #2a3d55;
      border-radius: 18px;
      width: 100%; max-width: 480px;
      padding: 28px;
      transform: scale(0.94) translateY(10px);
      transition: transform 0.2s;
    }
    .modal-overlay.show .modal { transform: scale(1) translateY(0); }
    .modal-title { font-size: 18px; font-weight: 800; color: #f1f5f9; margin-bottom: 22px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; display: block; }
    .form-input, .form-select {
      width: 100%;
      background: #0d1a2a;
      border: 1px solid #2a3d55;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: #1468e0; box-shadow: 0 0 0 3px rgba(20,104,224,0.12); }
    .form-input::placeholder { color: #334155; }
    .form-select option { background: #111827; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      background: #1a2535; border: 1px solid #2a3d55;
      color: #94a3b8; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 10px 20px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #22334a; }
    .btn-save {
      background: #1468e0; border: none;
      color: #fff; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 10px 24px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1a78f0; }

    /* ── Confirm dialog ──────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 300;
      padding: 20px;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: #111827;
      border: 1px solid #2a3d55;
      border-radius: 16px;
      width: 100%; max-width: 360px;
      padding: 28px 24px;
      text-align: center;
      transform: scale(0.92);
      transition: transform 0.2s;
    }
    .confirm-overlay.show .confirm-box { transform: scale(1); }
    .confirm-icon { font-size: 40px; margin-bottom: 12px; }
    .confirm-title { font-size: 17px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
    .confirm-sub { font-size: 13px; color: #64748b; margin-bottom: 22px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-confirm-cancel {
      background: #1a2535; border: 1px solid #2a3d55;
      color: #94a3b8; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 10px 22px; cursor: pointer;
    }
    .btn-confirm-del {
      background: #ef4444; border: none;
      color: #fff; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      padding: 10px 22px; cursor: pointer;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .main { padding: 16px; }
    }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <img class="header-logo" src="https://www.hyundai-wia.com/img/common/logo.png" alt="HYUNDAI WIA"
         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'" />
    <span class="header-logo-fallback" id="logoFallback" style="display:none">HYUNDAI WIA</span>
    <div class="header-divider"></div>
    <span class="header-title">랭킹 관리자</span>
    <span class="header-badge">BACK OFFICE</span>
  </div>
  <div class="header-right">
    <button class="btn-excel" onclick="downloadExcel()">
      <span class="btn-add-icon">⬇</span> 엑셀 다운로드
    </button>
    <button class="btn-danger" onclick="openDeleteAll()">
      <span class="btn-add-icon">🗑</span> 전체 삭제
    </button>
    <button class="btn-add" onclick="openAddModal()">
      <span class="btn-add-icon">+</span> 항목 추가
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">게임</span>
      <button class="filter-btn active" data-gfilter="all">전체</button>
      <button class="filter-btn" data-gfilter="typing">⌨️ 타이핑</button>
      <button class="filter-btn" data-gfilter="control">🕹️ 컨트롤</button>
      <button class="filter-btn" data-gfilter="jump">🦘 점프업</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">소속</span>
      <button class="filter-btn active" data-sfilter="all">전체</button>
      <button class="filter-btn" data-sfilter="의왕">의왕</button>
      <button class="filter-btn" data-sfilter="평택">평택</button>
      <button class="filter-btn" data-sfilter="서산">서산</button>
      <button class="filter-btn" data-sfilter="창원1공장">창원1</button>
      <button class="filter-btn" data-sfilter="창원2공장">창원2</button>
      <button class="filter-btn" data-sfilter="창원3공장">창원3</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">전체 참가자</div>
      <div class="stat-value" id="statAll">0</div>
      <div class="stat-sub">총 등록 수</div>
    </div>
    <div class="stat-card typing">
      <div class="stat-label">⌨️ 타이핑</div>
      <div class="stat-value" id="statTyping">0</div>
      <div class="stat-sub">참가자</div>
    </div>
    <div class="stat-card control">
      <div class="stat-label">🕹️ 컨트롤</div>
      <div class="stat-value" id="statControl">0</div>
      <div class="stat-sub">참가자</div>
    </div>
    <div class="stat-card jump">
      <div class="stat-label">🦘 점프업</div>
      <div class="stat-value" id="statJump">0</div>
      <div class="stat-sub">참가자</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header-bar">
      <span class="table-title">랭킹 목록</span>
      <span class="table-count" id="tableCount">0건</span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>스코어</th>
            <th>성함</th>
            <th>소속</th>
            <th>게임</th>
            <th>
              <span class="th-filter">
                등록시간
                <span class="filter-icon" id="dateFilterIcon" onclick="toggleDateDropdown(event)">▼</span>
                <div class="date-dropdown" id="dateDropdown" onclick="event.stopPropagation()">
                  <div class="date-dropdown-title">날짜 필터</div>
                  <div id="dateOptions"></div>
                  <div class="date-dropdown-actions">
                    <button class="date-mini-btn" onclick="selectAllDates()">전체</button>
                    <button class="date-mini-btn" onclick="clearAllDates()">해제</button>
                  </div>
                </div>
              </span>
            </th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">항목 추가</div>
    <div class="form-group">
      <label class="form-label">스코어</label>
      <input type="number" class="form-input" id="mScore" placeholder="숫자 입력" min="0" />
    </div>
    <div class="form-group">
      <label class="form-label">성함</label>
      <input type="text" class="form-input" id="mName" placeholder="홍길동" />
    </div>
    <div class="form-group">
      <label class="form-label">소속</label>
      <select class="form-select" id="mSite">
        <option value="">소속 선택</option>
        <option value="의왕">의왕 연구소</option>
        <option value="평택">평택 사업장</option>
        <option value="서산">서산 사업장</option>
        <option value="창원1공장">창원 1공장</option>
        <option value="창원2공장">창원 2공장</option>
        <option value="창원3공장">창원 3공장</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">게임</label>
      <select class="form-select" id="mGame">
        <option value="">게임 선택</option>
        <option value="typing">⌨️ 타이핑 챌린지</option>
        <option value="control">🕹️ 컨트롤 챌린지</option>
        <option value="jump">🦘 점프업 챌린지</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">삭제하시겠습니까?</div>
    <div class="confirm-sub">이 작업은 되돌릴 수 없습니다.</div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- DELETE ALL CONFIRM -->
<div class="confirm-overlay" id="deleteAllOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">전체 데이터를 삭제하시겠습니까?</div>
    <div class="confirm-sub">모든 랭킹 기록이 영구적으로 삭제됩니다.<br/>삭제 전 엑셀로 백업하는 것을 권장합니다.</div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeDeleteAll()">취소</button>
      <button class="btn-confirm-del" onclick="confirmDeleteAll()">전체 삭제</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = (location.port && location.port !== '3000') ? 'http://localhost:3000' : '';
  /* ── Data ──────────────────────────────────────── */
  const SITE_COLORS = {
    '의왕':     [59,130,246],
    '평택':     [16,185,129],
    '서산':     [245,158,11],
    '창원1공장':[139,92,246],
    '창원2공장':[239,68,68],
    '창원3공장':[6,182,212],
  };
  const GAME_META = {
    typing:  { label:'타이핑', icon:'⌨️', unit:'CPM',  color:'#3b82f6', bg:'rgba(59,130,246,0.1)' },
    control: { label:'컨트롤', icon:'🕹️', unit:'초',   color:'#8b5cf6', bg:'rgba(139,92,246,0.1)' },
    jump:    { label:'점프업', icon:'🦘', unit:'cm',   color:'#10b981', bg:'rgba(16,185,129,0.1)' },
  };

  let entries = [];

  async function loadEntries() {
    const res = await fetch(API_BASE + '/api/scores');
    entries = (await res.json()).map(e => ({
      id: e.id, score: e.score, name: e.name,
      site: e.site, game: e.game, time: e.created_at
    }));
    render();
  }

  /* ── Filter state ──────────────────────────────── */
  let gFilter = 'all';
  let sFilter = 'all';
  let dateFilter = new Set(); // 빈 set = 전체 표시

  document.querySelectorAll('[data-gfilter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-gfilter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gFilter = btn.dataset.gfilter;
      render();
    });
  });
  document.querySelectorAll('[data-sfilter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-sfilter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sFilter = btn.dataset.sfilter;
      render();
    });
  });

  /* ── Render ────────────────────────────────────── */
  function entryDate(e) {
    return (e.time || '').slice(0, 10); // 'YYYY-MM-DD'
  }

  // 게임별 정렬 방향 (control은 작은 값이 1등)
  const GAME_ASC = { control: true };
  function gameCompare(a, b) {
    if (a.game !== b.game) return a.game.localeCompare(b.game);
    return GAME_ASC[a.game] ? a.score - b.score : b.score - a.score;
  }

  function getFiltered() {
    return entries.filter(e => {
      if (gFilter !== 'all' && e.game !== gFilter) return false;
      if (sFilter !== 'all' && e.site !== sFilter) return false;
      if (dateFilter.size > 0 && !dateFilter.has(entryDate(e))) return false;
      return true;
    }).sort((a, b) => {
      // 게임 필터가 단일 게임이면 그 정렬 방향, 전체면 게임끼리 묶어 정렬
      if (gFilter !== 'all') {
        return GAME_ASC[gFilter] ? a.score - b.score : b.score - a.score;
      }
      return gameCompare(a, b);
    });
  }

  /* ── Date filter dropdown ──────────────────────── */
  function renderDateOptions() {
    const dates = [...new Set(entries.map(entryDate).filter(Boolean))].sort().reverse();
    const wrap = document.getElementById('dateOptions');
    if (dates.length === 0) {
      wrap.innerHTML = '<div style="font-size:12px;color:#475569;padding:6px 8px">데이터 없음</div>';
      return;
    }
    wrap.innerHTML = dates.map(d => {
      const checked = dateFilter.size === 0 || dateFilter.has(d) ? 'checked' : '';
      return `<label class="date-option">
        <input type="checkbox" value="${d}" ${checked} onchange="toggleDate('${d}', this.checked)" />
        ${d}
      </label>`;
    }).join('');
  }

  function toggleDate(d, checked) {
    // dateFilter.size === 0 은 "전체"를 의미. 체크박스를 처음 만질 때 현재 보이는 모든 날짜로 초기화.
    if (dateFilter.size === 0) {
      [...new Set(entries.map(entryDate).filter(Boolean))].forEach(x => dateFilter.add(x));
    }
    if (checked) dateFilter.add(d); else dateFilter.delete(d);
    updateDateFilterIcon();
    render();
  }

  function selectAllDates() {
    dateFilter.clear();
    renderDateOptions();
    updateDateFilterIcon();
    render();
  }

  function clearAllDates() {
    dateFilter = new Set(['__none__']); // 의도적으로 매칭되지 않는 값으로 0건 표시
    renderDateOptions();
    updateDateFilterIcon();
    render();
  }

  function updateDateFilterIcon() {
    const icon = document.getElementById('dateFilterIcon');
    const allDates = [...new Set(entries.map(entryDate).filter(Boolean))];
    const isAllSelected = dateFilter.size === 0 || allDates.every(d => dateFilter.has(d));
    icon.classList.toggle('active', !isAllSelected);
  }

  function toggleDateDropdown(ev) {
    ev.stopPropagation();
    const dd = document.getElementById('dateDropdown');
    const isShown = dd.classList.contains('show');
    if (!isShown) renderDateOptions();
    dd.classList.toggle('show');
  }

  document.addEventListener('click', (e) => {
    const dd = document.getElementById('dateDropdown');
    if (dd && dd.classList.contains('show') && !dd.contains(e.target) && e.target.id !== 'dateFilterIcon') {
      dd.classList.remove('show');
    }
  });

  /* ── Excel(XLSX) download ───────────────────────
     현재 admin 화면에 보이는 결과(필터/정렬 적용)를 그대로 export. */
  function downloadExcel() {
    if (typeof XLSX === 'undefined') {
      alert('엑셀 라이브러리 로드 실패. 새로고침 후 다시 시도해주세요.');
      return;
    }
    const list = getFiltered();
    const header = ['순위','게임','스코어','단위','성함','소속','등록시간'];
    const data = list.map((e, i) => [
      i + 1,
      GAME_META[e.game]?.label || e.game,
      e.score,
      GAME_META[e.game]?.unit || '',
      e.name,
      e.site,
      e.time || ''
    ]);
    const ws = XLSX.utils.aoa_to_sheet([header, ...data]);
    ws['!cols'] = [
      { wch: 6 }, { wch: 10 }, { wch: 10 }, { wch: 6 },
      { wch: 12 }, { wch: 12 }, { wch: 20 },
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '랭킹');
    const today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `랭킹_${today}.xlsx`);
  }

  /* ── Delete all ──────────────────────────────── */
  function openDeleteAll() {
    document.getElementById('deleteAllOverlay').classList.add('show');
  }
  function closeDeleteAll() {
    document.getElementById('deleteAllOverlay').classList.remove('show');
  }
  async function confirmDeleteAll() {
    await fetch(API_BASE + '/api/scores', { method: 'DELETE' });
    closeDeleteAll();
    await loadEntries();
  }

  function siteChip(site) {
    const rgb = SITE_COLORS[site] || [100,116,139];
    return `<span class="chip" style="background:rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.12);color:rgb(${rgb[0]},${rgb[1]},${rgb[2]});border:1px solid rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.3)">${site}</span>`;
  }

  function gameChip(game) {
    const m = GAME_META[game];
    if (!m) return '-';
    return `<span class="chip" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}33">${m.icon} ${m.label}</span>`;
  }

  function rankBadge(rank) {
    let cls = 'rank-badge';
    if (rank === 1) cls += ' top1';
    else if (rank === 2) cls += ' top2';
    else if (rank === 3) cls += ' top3';
    return `<span class="${cls}">${rank}</span>`;
  }

  function render() {
    const filtered = getFiltered();
    const tbody = document.getElementById('tableBody');

    /* Stats */
    document.getElementById('statAll').textContent     = entries.length;
    document.getElementById('statTyping').textContent  = entries.filter(e => e.game === 'typing').length;
    document.getElementById('statControl').textContent = entries.filter(e => e.game === 'control').length;
    document.getElementById('statJump').textContent    = entries.filter(e => e.game === 'jump').length;
    document.getElementById('tableCount').textContent  = filtered.length + '건';
    updateDateFilterIcon();

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#334155">데이터가 없습니다</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((e, i) => {
      const rank = i + 1;
      const unit = GAME_META[e.game]?.unit || '';
      return `<tr>
        <td>${rankBadge(rank)}</td>
        <td><span class="score-val">${e.score.toLocaleString()}</span><span class="score-unit">${unit}</span></td>
        <td class="name-cell">${e.name}</td>
        <td>${siteChip(e.site)}</td>
        <td>${gameChip(e.game)}</td>
        <td class="time-cell">${e.time}</td>
        <td class="action-cell">
          <button class="btn-edit" onclick="openEditModal(${e.id})">수정</button>
          <button class="btn-del"  onclick="openConfirm(${e.id})">삭제</button>
        </td>
      </tr>`;
    }).join('');
  }

  /* ── Modal ─────────────────────────────────────── */
  let editingId = null;

  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '항목 추가';
    document.getElementById('mScore').value = '';
    document.getElementById('mName').value = '';
    document.getElementById('mSite').value = '';
    document.getElementById('mGame').value = '';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function openEditModal(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '항목 수정';
    document.getElementById('mScore').value = e.score;
    document.getElementById('mName').value = e.name;
    document.getElementById('mSite').value = e.site;
    document.getElementById('mGame').value = e.game;
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  async function saveEntry() {
    const score   = Number(document.getElementById('mScore').value);
    const name    = document.getElementById('mName').value.trim();
    const site    = document.getElementById('mSite').value;
    const game    = document.getElementById('mGame').value;

    if (!score || score <= 0) return alert('스코어를 입력해주세요.');
    if (!name)    return alert('성함을 입력해주세요.');
    if (!site)    return alert('소속을 선택해주세요.');
    if (!game)    return alert('게임을 선택해주세요.');

    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

    if (editingId === null) {
      await fetch(API_BASE + '/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score, name, site, game })
      });
    } else {
      await fetch(`${API_BASE}/api/scores/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score, name, site, game })
      });
    }
    closeModal();
    await loadEntries();
  }

  /* Close modal on overlay click */
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  /* ── Confirm delete ────────────────────────────── */
  let deletingId = null;

  function openConfirm(id) {
    deletingId = id;
    document.getElementById('confirmOverlay').classList.add('show');
  }
  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('show');
    deletingId = null;
  }
  async function confirmDelete() {
    if (deletingId === null) return;
    await fetch(`${API_BASE}/api/scores/${deletingId}`, { method: 'DELETE' });
    closeConfirm();
    await loadEntries();
  }

  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });

  /* ── Init ──────────────────────────────────────── */
  loadEntries();
</script>
</body>
</html>
