<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점프업 챌린지 랭킹</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, #aacce8 0%, #c0dcf0 28%, #d8eaf8 55%, #edf4fb 78%, #f6fafe 100%);
      min-height: 100vh;
    }

    /* ── Crystal BG ── */
    .bg-crystal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none; z-index: 0;
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    /* ── Main Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding: 20px 20px 0;
    }

    /* ── 50th Emblem ── */
    .emblem-50 {
      position: absolute; top: -10px; right: -10px;
      width: 280px;
      pointer-events: none; z-index: 10;
    }

    /* ── Page Header ── */
    .page-header {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 18px;
    }
    .campaign-label {
      font-size: 13px; font-weight: 700;
      color: #1a4870; letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .beyond-logo {
      fill: #040000;
      width: 45%;
      display: block;
    }

    /* ── Game Header ── */
    .game-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }
    .game-icon {
      width: 76px; height: 76px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
    }
    .game-icon img {
      display: block; width: 1123px; height: auto; flex-shrink: 0;
      margin-left: -204px; margin-top: -542px;
    }
    .game-header-info { flex: 1; min-width: 0; }
    .game-title {
      font-size: 28px; font-weight: 900; color: #7a4800;
      line-height: 1.2;
    }
    .game-sub {
      font-size: 14px; font-weight: 600; color: #8a5818;
      margin-top: 3px;
    }

    /* ── Ranking List Container ── */
    .ranking-container {
      flex: 1;
      background: rgba(205,230,248,0.78);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(20,80,150,0.10);
      backdrop-filter: blur(18px);
      padding: 12px 10px;
      margin-bottom: 18px;
    }

    /* ── Rank Items ── */
    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.82);
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 2px 8px rgba(20,70,150,0.05);
      margin-bottom: 8px;
    }
    .rank-item:last-child { margin-bottom: 0; }
    .rank-item.r1 { background: rgba(255,255,255,0.96); box-shadow: 0 4px 18px rgba(20,70,150,0.10); }

    .rank-badge {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; flex-shrink: 0;
      background: rgba(170,205,235,0.35); color: #4a6a8a;
    }
    .r1 .rank-badge { background: linear-gradient(135deg, #f8d060, #e8a020); color: #fff; font-size: 16px; }
    .r2 .rank-badge { background: linear-gradient(135deg, #d0d8e4, #a8b8c8); color: #fff; font-size: 16px; }
    .r3 .rank-badge { background: linear-gradient(135deg, #d8a070, #c07040); color: #fff; font-size: 16px; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-size: 15px; font-weight: 800; color: #0b1f3a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .r1 .rank-name { font-size: 17px; }

    .site-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px 2px 5px; border-radius: 20px; margin-top: 2px;
    }
    .site-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .rank-score { text-align: right; flex-shrink: 0; }
    .score-num { font-size: 20px; font-weight: 900; color: #0b1f3a; }
    .r1 .score-num { font-size: 24px; }
    .score-unit { font-size: 10px; color: #6888aa; margin-top: 1px; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      padding: 10px 0 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .footer-logo { height: 48px; }

    /* ── Responsive ── */
    @media (min-width: 600px) {
      .wrapper { max-width: 640px; padding: 24px 28px 0; }
      .campaign-label { font-size: 17px; letter-spacing: 2px; }
      .beyond-logo { width: 52%; }
      .game-title { font-size: 34px; }
      .game-sub { font-size: 16px; }
      .emblem-50 { width: 340px; }
      .footer-logo { height: 56px; }
    }
    @media (min-width: 900px) {
      .wrapper { max-width: 700px; padding: 28px 32px 0; }
      .campaign-label { font-size: 18px; }
      .game-title { font-size: 36px; }
      .emblem-50 { width: 380px; }
    }
  </style>
</head>

<script>
  const SITE_COLORS = {
    '의왕연구소': [59,130,246], '평택공장': [16,185,129], '서산공장': [245,158,11],
    '창원1공장': [139,92,246], '창원2공장': [239,68,68], '창원3공장': [6,182,212],
  };

  function chip(site) {
    const [r,g,b] = SITE_COLORS[site] || [120,150,180];
    return `<span class="site-chip" style="background:rgba(${r},${g},${b},0.10);border:1px solid rgba(${r},${g},${b},0.30);color:rgb(${r},${g},${b})">
              <span class="site-dot" style="background:rgb(${r},${g},${b})"></span>${site}
            </span>`;
  }

  function render(list) {
    const el = document.getElementById('rank-list');
    if (!list || list.length === 0) {
      el.innerHTML = '<div style="text-align:center;padding:40px;opacity:0.4">아직 등록된 기록이 없습니다</div>';
      return;
    }
    el.innerHTML = list.map((d, i) => `
      <div class="rank-item r${i+1}">
        <div class="rank-badge">${i + 1}</div>
        <div class="rank-info">
          <div class="rank-name">${d.name}</div>
          <div>${chip(d.site)}</div>
        </div>
        <div class="rank-score">
          <div class="score-num">${d.score}</div>
          <div class="score-unit">cm</div>
        </div>
      </div>`).join('');
  }

  function fetchRankings() {
    fetch('/api/rankings?game=jump')
      .then(r => r.json())
      .then(data => {
        const list = Array.isArray(data) ? data : (data.jump || data.rankings || []);
        render(list);
      })
      .catch(() => {});
  }

  fetchRankings();
  setInterval(fetchRankings, 5000);
</script>
</body>
</html>
