<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>3종 챌린지 랭킹보드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #00224b;
    }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }

    /* SVG viewBox = 1920 × 1080. 모든 오버레이는 % 기반 절대 위치. */
    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 1920 / 1080));
      height: min(100vh, calc(100vw * 1080 / 1920));
      overflow: hidden;
    }
    .bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; user-select: none;
      display: block;
    }

    /* ── Rank Row Overlay (9개) ──
       SVG에 흰색 둥근 사각형 + "1위/2위/3위" 라벨이 이미 그려져 있음.
       이 오버레이는 데이터(이름·기록)만 채움. */
    .rank-row {
      position: absolute;
      width: 23.72%;   /* 455.46 / 1920 */
      height: 7.88%;   /* 85.06 / 1080 */
    }
    /* SVG "X위" 라벨 영역(0~24.68%) 다음의 콘텐츠 영역. */
    .rank-content {
      position: absolute;
      left: 25%;
      right: 2%;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3%;
      padding: 0 2%;
      min-width: 0;
    }
    .rank-name {
      font-size: clamp(14px, 2.0vh, 26px);
      font-weight: 800;
      color: #003685;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 0 1 auto;
    }
    .rank-score {
      font-size: clamp(15px, 2.2vh, 28px);
      font-weight: 900;
      color: #003685;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .rank-score .unit {
      font-size: 0.6em;
      font-weight: 700;
      margin-left: 0.18em;
      opacity: 0.75;
    }
    .rank-empty {
      width: 100%;
      text-align: center;
      font-size: clamp(14px, 1.8vh, 24px);
      font-weight: 700;
      color: #6a8aaa;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    /* ── LIVE / Clock (우측 하단) ── */
    .live-box {
      position: absolute;
      right: 2.2%;
      bottom: 2.4%;
      display: flex;
      align-items: center;
      gap: 0.8vh;
      padding: 0.6vh 1.4vh;
      background: rgba(255,255,255,0.85);
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(0,30,80,0.18);
    }
    .live-dot {
      width: 1.0vh; height: 1.0vh; border-radius: 50%;
      background: #28c870;
      animation: live-blink 1.8s infinite;
    }
    @keyframes live-blink { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
    .live-label {
      font-size: clamp(11px, 1.3vh, 18px);
      font-weight: 900;
      color: #28c870;
      letter-spacing: 0.15em;
    }
    .live-date {
      font-size: clamp(11px, 1.3vh, 18px);
      font-weight: 700;
      color: #003685;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      opacity: 0.85;
    }
    .live-clock {
      font-size: clamp(12px, 1.5vh, 20px);
      font-weight: 800;
      color: #003685;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

<div class="stage">
  <img class="bg" src="디자인/랭킹보드.svg" alt="" />

  <!-- Left col: 타이핑 챌린지 (x=155 → 8.07%) -->
  <div class="rank-row" data-game="typing" data-rank="0" style="left:8.07%;  top:57.78%"></div>
  <div class="rank-row" data-game="typing" data-rank="1" style="left:8.07%;  top:67.53%"></div>
  <div class="rank-row" data-game="typing" data-rank="2" style="left:8.07%;  top:77.27%"></div>

  <!-- Middle col: 컨트롤 챌린지 (x=731.91 → 38.12%) -->
  <div class="rank-row" data-game="control" data-rank="0" style="left:38.12%; top:57.78%"></div>
  <div class="rank-row" data-game="control" data-rank="1" style="left:38.12%; top:67.53%"></div>
  <div class="rank-row" data-game="control" data-rank="2" style="left:38.12%; top:77.27%"></div>

  <!-- Right col: 점프업 챌린지 (x=1308.81 → 68.17%) -->
  <div class="rank-row" data-game="jump" data-rank="0" style="left:68.17%; top:57.78%"></div>
  <div class="rank-row" data-game="jump" data-rank="1" style="left:68.17%; top:67.53%"></div>
  <div class="rank-row" data-game="jump" data-rank="2" style="left:68.17%; top:77.27%"></div>

  <div class="live-box">
    <div class="live-dot"></div>
    <div class="live-label">LIVE</div>
    <div class="live-date" id="liveDate">----.--.--</div>
    <div class="live-clock" id="liveClock">--:--:--</div>
  </div>
</div>

<script>
  const API_BASE = (location.port && location.port !== '3000') ? 'http://localhost:3000' : '';

  /* 컨트롤 점수(정수)를 6자리로 패딩 후 2자리씩 콜론으로 구분.
     ex) 123456 → "12:34:56"
         1432   → "00:14:32" */
  function controlFormat(score) {
    const padded = String(Math.max(0, Math.floor(Number(score)))).padStart(6, '0');
    return `${padded.slice(0,2)}:${padded.slice(2,4)}:${padded.slice(4,6)}`;
  }

  function formatScore(game, score) {
    if (score == null) return '';
    const n = Number(score);
    if (game === 'typing') {
      return `${n.toLocaleString('en-US')}<span class="unit">CPM</span>`;
    }
    if (game === 'control') {
      return `${controlFormat(n)}<span class="unit">초</span>`;
    }
    if (game === 'jump') {
      return `${n}<span class="unit">cm</span>`;
    }
    return String(score);
  }

  function renderGame(game, list) {
    for (let i = 0; i < 3; i++) {
      const row = document.querySelector(`.rank-row[data-game="${game}"][data-rank="${i}"]`);
      const entry = list && list[i];
      if (!entry) {
        row.innerHTML = `<div class="rank-content"><div class="rank-empty">—</div></div>`;
        continue;
      }
      row.innerHTML = `
        <div class="rank-content">
          <div class="rank-name">${entry.name}</div>
          <div class="rank-score">${formatScore(game, entry.score)}</div>
        </div>`;
    }
  }

  function fetchRankings() {
    fetch(API_BASE + '/api/rankings')
      .then(r => r.json())
      .then(data => {
        renderGame('typing',  data.typing);
        renderGame('control', data.control);
        renderGame('jump',    data.jump);
      })
      .catch(() => {});
  }

  const DOW = ['일','월','화','수','목','금','토'];
  function tickClock() {
    const n = new Date();
    const z = v => String(v).padStart(2, '0');
    document.getElementById('liveDate').textContent =
      `${n.getFullYear()}.${z(n.getMonth()+1)}.${z(n.getDate())} (${DOW[n.getDay()]})`;
    document.getElementById('liveClock').textContent =
      `${z(n.getHours())}:${z(n.getMinutes())}:${z(n.getSeconds())}`;
  }

  fetchRankings();
  setInterval(fetchRankings, 5000);
  tickClock();
  setInterval(tickClock, 1000);
</script>
</body>
</html>
