<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>점프업 챌린지 — 등록</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #00224b;
    }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 1077.06 / 1920));
      height: min(100vh, calc(100vw * 1920 / 1077.06));
      overflow: hidden;
    }
    .bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; user-select: none;
      display: block;
    }
    .field {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      color: #07328f;
      font-weight: 800;
      letter-spacing: -0.01em;
      padding: 0 5%;
      caret-color: #07328f;
    }
    .field::placeholder { color: transparent; }
    .field-score {
      left: 13.41%; top: 45.02%;
      width: 73.45%; height: 6.71%;
      font-size: clamp(20px, 4.2vh, 44px);
      text-align: left;
    }
    .field-name {
      left: 13.41%; top: 57.21%;
      width: 73.45%; height: 6.71%;
      font-size: clamp(20px, 4.2vh, 44px);
      text-align: left;
    }
    .site-btn {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 1vh;
      transition: background 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .site-btn:active { transform: scale(0.97); }
    .site-btn.selected {
      background: rgba(7, 50, 143, 0.18);
      box-shadow: 0 0 0 3px #07328f inset;
    }
    .site-1 { left: 14.33%; top: 69.40%; width: 21.51%; height: 3.83%; }
    .site-2 { left: 39.38%; top: 69.40%; width: 21.51%; height: 3.83%; }
    .site-3 { left: 64.43%; top: 69.40%; width: 21.51%; height: 3.83%; }
    .site-4 { left: 13.41%; top: 74.21%; width: 23.34%; height: 3.83%; }
    .site-5 { left: 39.38%; top: 74.21%; width: 23.34%; height: 3.83%; }
    .site-6 { left: 63.51%; top: 74.21%; width: 23.34%; height: 3.83%; }
    .submit-btn {
      position: absolute;
      left: 13.41%; top: 80.40%;
      width: 73.45%; height: 4.94%;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 1.6vh;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.15s;
    }
    .submit-btn:active { opacity: 0.85; transform: scale(0.99); }
    .toast {
      position: fixed; bottom: 6vh; left: 50%; transform: translateX(-50%);
      background: rgba(10,30,60,0.92); color: #fff;
      padding: 1.2vh 5vw; border-radius: 30px;
      font-size: clamp(13px, 1.7vh, 17px); font-weight: 600;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="stage">
  <img class="bg" src="디자인/점프업챌린지.svg" alt="" />

  <input class="field field-score" id="score" type="number" inputmode="numeric" autocomplete="off" min="0" />
  <input class="field field-name"  id="name"  type="text" autocomplete="off" />

  <button class="site-btn site-1" data-site="창원 1공장" onclick="selectSite(this)" aria-label="창원 1공장"></button>
  <button class="site-btn site-2" data-site="창원 2공장" onclick="selectSite(this)" aria-label="창원 2공장"></button>
  <button class="site-btn site-3" data-site="창원 3공장" onclick="selectSite(this)" aria-label="창원 3공장"></button>
  <button class="site-btn site-4" data-site="의왕 연구소" onclick="selectSite(this)" aria-label="의왕 연구소"></button>
  <button class="site-btn site-5" data-site="서산 공장"   onclick="selectSite(this)" aria-label="서산 공장"></button>
  <button class="site-btn site-6" data-site="평택 공장"   onclick="selectSite(this)" aria-label="평택 공장"></button>

  <button class="submit-btn" onclick="submit()" aria-label="등록하기"></button>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = (location.port && location.port !== '3000') ? 'http://localhost:3000' : '';
  let selectedSite = '';
  const scoreEl = document.getElementById('score');

  function selectSite(el) {
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedSite = el.dataset.site;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function submit() {
    const score = scoreEl.value.trim();
    const name  = document.getElementById('name').value.trim();
    if (!score) { showToast('스코어를 입력해주세요.'); return; }
    if (!name)  { showToast('이름을 입력해주세요.'); return; }
    if (!selectedSite) { showToast('소속을 선택해주세요.'); return; }

    fetch(API_BASE + '/api/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game: 'jump', score: Number(score), name, site: selectedSite })
    }).then(r => r.ok ? showToast('등록되었습니다!') : showToast('오류가 발생했습니다.'))
      .catch(() => showToast('서버 연결 오류'));

    scoreEl.value = '';
    document.getElementById('name').value  = '';
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('selected'));
    selectedSite = '';
  }
</script>
</body>
</html>
